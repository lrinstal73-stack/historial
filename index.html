<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial de Portes | Luis</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #0f1014; color: white; padding: 20px; }
        .resumen-total { background: #10b981; padding: 15px; border-radius: 12px; margin-bottom: 20px; text-align: center; border: 1px solid #059669; }
        .porte-card { background: #1c1d24; padding: 15px; border-radius: 12px; margin-bottom: 15px; border-left: 5px solid #3b82f6; position: relative; }
        .cliente { font-weight: bold; font-size: 1.1rem; color: #3b82f6; }
        .precio { position: absolute; top: 15px; right: 15px; color: #10b981; font-weight: bold; font-size: 1.2rem; }
        .info { font-size: 0.9rem; color: #ccc; margin-top: 5px; }
        button.logout { background: #333; color: #ff4d4d; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; margin-bottom: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <button class="logout" onclick="logout()">Cerrar Sesión</button>
    <div id="total-container"></div>
    <h2>📋 Historial de Portes</h2>
    <div id="lista-portes">Conectando con la nube...</div>

    <script>
        // 1. SEGURIDAD PIN
        function checkAuth() {
            const PIN_CORRECTO = "7373";
            if (localStorage.getItem('auth_luis') !== 'true') {
                let pass = prompt("Introduce el PIN de acceso:");
                if (pass === PIN_CORRECTO) {
                    localStorage.setItem('auth_luis', 'true');
                } else {
                    alert("PIN Incorrecto");
                    window.location.href = "https://lrinstal73-stack.github.io/control/";
                }
            }
        }
        function logout() { localStorage.removeItem('auth_luis'); location.reload(); }
        checkAuth();

        // 2. CONEXIÓN (Claves revisadas)
        const SB_URL = "https://hkrbyjxspermnedciqrr.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhrcmJ5anhzcGVybW5lZGNpcXJyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDMwMzI1MTMsImV4cCI6MjA1ODYwODUxM30.RlGUguqx-gYQqIyR0W2AwQ_qgRchMDRiM2M5MGYtYjM0Zi00ZDEzLWEyMzYtZDE4YzgyYjA0MzI3";
        
        async function cargarDatos() {
            try {
                const _supabase = supabase.createClient(SB_URL, SB_KEY);
                const { data, error } = await _supabase
                    .from('portes')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                const contenedor = document.getElementById('lista-portes');
                const totalContenedor = document.getElementById('total-container');

                if (!data || data.length === 0) {
                    contenedor.innerHTML = "No hay portes registrados todavía.";
                    return;
                }

                // Cálculo de ingresos totales
                const totalFacturado = data.reduce((acc, p) => acc + (Number(p.precio) || 0), 0);
                totalContenedor.innerHTML = `
                    <div class="resumen-total">
                        <small>TOTAL FACTURADO</small>
                        <div style="font-size: 2rem; font-weight: bold;">${totalFacturado}€</div>
                    </div>
                `;

                contenedor.innerHTML = data.map(p => `
                    <div class="porte-card">
                        <div class="precio">${p.precio || 0}€</div>
                        <div class="cliente">${p.cliente || 'Sin nombre'}</div>
                        <div class="info">📍 ${p.origen || '-'} ➡ ${p.destino || '-'}</div>
                    </div>
                `).join('');

            } catch (err) {
                document.getElementById('lista-portes').innerHTML = "Error: " + err.message;
            }
        }

        setTimeout(cargarDatos, 1000);
    </script>
</body>
</html>
