<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial de Portes | Luis</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #0f1014; color: white; padding: 20px; }
        .porte-card { background: #1c1d24; padding: 15px; border-radius: 12px; margin-bottom: 15px; border-left: 5px solid #3b82f6; position: relative; }
        .cliente { font-weight: bold; font-size: 1.1rem; color: #3b82f6; }
        .precio { position: absolute; top: 15px; right: 15px; color: #10b981; font-weight: bold; }
        button.logout { background: #333; color: #ff4d4d; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; margin-bottom: 20px; }
    </style>
</head>
<body>
    <button class="logout" onclick="logout()">Cerrar Sesión</button>
    <h2>📋 Historial de Portes</h2>
    <div id="lista-portes">Conectando con la nube...</div>

    <script>
        // 1. SEGURIDAD PIN
        function checkAuth() {
            const PIN_CORRECTO = "7373";
            if (localStorage.getItem('auth_luis') !== 'true') {
                let pass = prompt("PIN de seguridad:");
                if (pass === PIN_CORRECTO) {
                    localStorage.setItem('auth_luis', 'true');
                } else {
                    alert("PIN Incorrecto");
                    window.location.href = "https://lrinstal73-stack.github.io/control/";
                }
            }
        }
        function logout() { localStorage.removeItem('auth_luis'); location.reload(); }
        checkAuth();

        // 2. CONEXIÓN (Datos extraídos de tus capturas)
        const SB_URL = "https://hkrbyjxspermnedciqrr.supabase.co";
        const SB_KEY = "sb_publishable_RlGUguqx-gYQqIyR0W2AwQ_qgRchMDRiM2M5MGYtYjM0Zi00ZDEzLWEyMzYtZDE4YzgyYjA0MzI3";
        
        async function cargarDatos() {
            try {
                const _supabase = supabase.createClient(SB_URL, SB_KEY);
                const { data, error } = await _supabase
                    .from('portes')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                const contenedor = document.getElementById('lista-portes');
                if (!data || data.length === 0) {
                    contenedor.innerHTML = "No hay portes registrados. ¡Registra uno nuevo para probar!";
                    return;
                }

                contenedor.innerHTML = data.map(p => `
                    <div class="porte-card">
                        <div class="precio">${p.precio || 0}€</div>
                        <div class="cliente">${p.cliente}</div>
                        <div style="font-size:0.8rem; color:#888; margin-top:5px;">
                            📍 ${p.origen || 'S/O'} ➡ ${p.destino || 'S/D'}
                        </div>
                    </div>
                `).join('');

            } catch (err) {
                document.getElementById('lista-portes').innerHTML = "Error: " + err.message;
            }
        }

        // Retraso de 1 segundo para asegurar la carga de la librería
        setTimeout(cargarDatos, 1000);
    </script>
</body>
</html>
